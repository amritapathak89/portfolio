name: CI

on:
  push:
    branches: [master, original-site]
  pull_request:

jobs:
  build:
    name: Build CSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      # output.css is git-ignored and generated; this confirms the Tailwind
      # build still succeeds (catches input.css / token / keyframe breakage).
      - name: Build Tailwind CSS
        run: npm run build
        working-directory: frontend

      - name: Verify CSS was produced
        run: test -s frontend/public/output.css
