name: CI/CD

on:
  pull_request:
  push:
    branches: [master]

jobs:
  ci:
    name: CI - Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build App
        working-directory: frontend
        run: npm run build:css

      - name: Run Tests
        working-directory: frontend
        run: echo "Running tests..." # Replace with actual test command

  cd:
    name: CD - Deploy
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploying..."
