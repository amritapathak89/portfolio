<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../dist/output.css">
  <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
  <script src="https://kit.fontawesome.com/5ff543a53f.js" crossorigin="anonymous"></script>
  <title>Amrita Vidhate - Designer & Coder</title>
</head>

<body class="font-sans bg-gray-50 text-gray-900">

  <!-- Header -->
  <header class="bg-white shadow">
    <nav class="container mx-auto flex justify-between items-center p-4">
      <a href="index.html" class="flex items-center gap-4">
        <img src="./assets/images/amy-logo.svg" alt="logo" class="w-12 h-12">
        <span class="font-bold text-xl">Amrita Vidhate | Web Developer</span>
      </a>
      <ul class="hidden md:flex gap-6 text-gray-700 font-medium">
        <li><a href="about.html" class="hover:text-blue-500">About</a></li>
        <li><a href="work.html" class="hover:text-blue-500">My Work</a></li>
        <li><a href="https://fusionplatter.eu/" class="hover:text-blue-500">Blog</a></li>
        <li><a href="contact.html" class="hover:text-blue-500">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Contact Section -->
  <section id="contact-page-section" class="py-16 bg-gray-50">
      <div class="container mx-auto max-w-xl">
        <h2 class="text-3xl font-bold mb-8 text-center">Get in Touch</h2>
        <form class="space-y-6">
          <div>
            <label class="block mb-1 font-medium" for="name">Name</label>
            <input type="text" id="name" placeholder="Your Name"
              class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block mb-1 font-medium" for="email">Email</label>
            <input type="email" id="email" placeholder="Your Email"
              class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block mb-1 font-medium" for="company">Company</label>
            <input type="text" id="company" placeholder="Company Name"
              class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block mb-1 font-medium" for="message">Message</label>
            <textarea id="message" placeholder="Your Message"
              class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 h-32"></textarea>
          </div>
          <button type="submit"
            class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition">Submit</button>
        </form>
      </div>
    </section>

  <!-- Footer -->
  <footer class="bg-white text-black py-8">
    <div class="container mx-auto flex justify-center gap-6">
      <p class="text-sm text-gray-500">Connect with me :</p>
      <p class="text-sm text-gray-500">amritavidhate@gmail.com</p>
    </div>
  </footer>
</body>

</html>
